[project]
name = "app"
version = "0.2.0"
description = "Consumer package — depends on lib via workspace source."
requires-python = ">=3.12"
dependencies = ["lib>=0.1.0"]

[tool.uv.sources]
# Lesson 3 moved the `lib` source override to the workspace root, since
# the path is most naturally resolved relative to the workspace head.
# App's pyproject.toml stays clean — only the registry-shaped name on
# `project.dependencies`. Downstream consumers who install `app` from a
# real index get `lib` from a real index.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]
